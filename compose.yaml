services:
  frontend:
    build:
      context: .
      target: runtime
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://host.docker.internal:8080}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - '3000:8080'
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,mode=0755
      - /var/run:size=1m,mode=0755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
